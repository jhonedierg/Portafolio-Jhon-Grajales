<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App del Clima</title>

<style>

body{
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    transition: 0.5s;
}

.app{
    background: white;
    width: 320px;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h2{
    margin-bottom: 20px;
}

input{
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-bottom: 10px;
    font-size: 16px;
    box-sizing: border-box;
}

button{
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #007bff;
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-bottom: 10px;
    transition: 0.3s;
}

button:hover{
    background: #0056b3;
}

.resultado{
    margin-top: 15px;
    font-size: 18px;
}

.resultado img{
    width: 100px;
}

</style>

</head>

<body>

<div class="app">

    <h2>🌤️ App del Clima</h2>

    <input 
        type="text" 
        id="ciudad" 
        placeholder="Escribe una ciudad"
    >

    <button onclick="buscarClima()">
        Buscar clima
    </button>

    <button onclick="obtenerUbicacion()">
        📍 Mi ubicación
    </button>

    <div class="resultado" id="resultado"></div>

</div>

<script>

async function buscarClima(){

    let ciudad = document.getElementById("ciudad").value;
    let resultado = document.getElementById("resultado");

    if(ciudad === ""){
        resultado.innerHTML = "⚠️ Escribe una ciudad";
        return;
    }

    try{

        let apiKey = "784e68ade6741e76e435b1dcdac95bb7";

        let respuesta = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${ciudad}&appid=${apiKey}&units=metric&lang=es`
        );

        let datos = await respuesta.json();

        if(datos.cod == "404"){
            resultado.innerHTML = "❌ Ciudad no encontrada";
            return;
        }

        mostrarClima(datos);

    }catch(error){
        resultado.innerHTML = "❌ Error al obtener datos";
    }
}

async function obtenerUbicacion(){

    let resultado = document.getElementById("resultado");

    if(!navigator.geolocation){
        resultado.innerHTML = "La geolocalización no es compatible";
        return;
    }

    navigator.geolocation.getCurrentPosition(

        async function(posicion){

            let lat = posicion.coords.latitude;
            let lon = posicion.coords.longitude;

            try{

                let apiKey = "784e68ade6741e76e435b1dcdac95bb7";

                let respuesta = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric&lang=es`
                );

                let datos = await respuesta.json();

                mostrarClima(datos);

            }catch(error){
                resultado.innerHTML = "❌ Error al obtener ubicación";
            }

        },

        function(){
            resultado.innerHTML = "⚠️ Debes permitir la ubicación";
        }

    );
}

function mostrarClima(datos){

    let resultado = document.getElementById("resultado");

    let icono = datos.weather[0].icon;
    let clima = datos.weather[0].main;

    cambiarFondo(clima);

    resultado.innerHTML = `
        <h3>${datos.name}</h3>

        <img src="https://openweathermap.org/img/wn/${icono}@2x.png">

        <p>🌡️ ${datos.main.temp}°C</p>

        <p>☁️ ${datos.weather[0].description}</p>
    `;
}

function cambiarFondo(clima){

    if(clima === "Clear"){

        document.body.style.background =
        "linear-gradient(135deg, #fceabb, #f8b500)";
    }

    else if(clima === "Rain"){

        document.body.style.background =
        "linear-gradient(135deg, #4b79a1, #283e51)";
    }

    else if(clima === "Clouds"){

        document.body.style.background =
        "linear-gradient(135deg, #bdc3c7, #2c3e50)";
    }

    else{

        document.body.style.background =
        "linear-gradient(135deg, #74ebd5, #ACB6E5)";
    }
}

</script>

</body>
</html>
