<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movie App PRO</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
}

/* HEADER */
header{
    background:#e50914;
    padding:20px;
    text-align:center;
}

/* BUSCADOR */
.buscador{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:20px;
    flex-wrap:wrap;
}

input{
    padding:12px;
    width:300px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#e50914;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#b20710;
}

/* GRID */
#contenedor{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:#1c1c1c;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
    cursor:pointer;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
}

.info{
    padding:15px;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
}

.modal-contenido{
    background:#222;
    width:80%;
    max-width:600px;
    margin:60px auto;
    padding:20px;
    border-radius:15px;
    position:relative;
    animation:fade 0.3s;
}

@keyframes fade{
    from{transform:scale(0.8);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

.cerrar{
    position:absolute;
    right:15px;
    top:10px;
    cursor:pointer;
    font-size:20px;
}
</style>

</head>

<body>

<header>
    <h1>🎬 Movie App PRO</h1>
</header>

<div class="buscador">

    <input type="text" id="buscar" placeholder="Buscar película...">

    <button onclick="buscarPeliculas()">Buscar</button>

    <button onclick="mostrarFavoritos()">⭐ Favoritos</button>

</div>

<div id="contenedor"></div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-contenido">

        <span class="cerrar" onclick="cerrarModal()">✖</span>

        <div id="detalle"></div>

    </div>
</div>

<script>

let timer;
let apiKey = "28119503";

/* 🔎 BÚSQUEDA AUTOMÁTICA */
document.getElementById("buscar").addEventListener("input", () => {
    clearTimeout(timer);

    timer = setTimeout(() => {
        buscarPeliculas();
    }, 500);
});

/* 🎬 BUSCAR */
async function buscarPeliculas(){

    let pelicula = document.getElementById("buscar").value;
    let contenedor = document.getElementById("contenedor");

    if(pelicula === ""){
        contenedor.innerHTML = "<p>Escribe una película</p>";
        return;
    }

    contenedor.innerHTML = "⏳ Buscando...";

    try{

        let respuesta = await fetch(
            `https://www.omdbapi.com/?s=${pelicula}&apikey=${apiKey}`
        );

        let datos = await respuesta.json();

        if(datos.Response === "False"){
            contenedor.innerHTML = "<p>No se encontraron resultados</p>";
            return;
        }

        contenedor.innerHTML = "";

        datos.Search.forEach(movie => {

            contenedor.innerHTML += `
            <div class="card" onclick="verDetalles('${movie.imdbID}')">

                <img src="${movie.Poster !== "N/A" ? movie.Poster : 'https://via.placeholder.com/300x450'}">

                <div class="info">
                    <h3>${movie.Title}</h3>
                    <p>${movie.Year}</p>

                    <button onclick="event.stopPropagation(); guardarFavorito('${movie.Title}','${movie.Poster}')">
                        ⭐ Favorito
                    </button>
                </div>

            </div>`;
        });

    }catch(error){
        contenedor.innerHTML = "Error al buscar";
    }
}

/* ⭐ FAVORITOS */
function guardarFavorito(titulo, poster){

    let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

    if(favoritos.some(f => f.titulo === titulo)){
        alert("Ya está en favoritos");
        return;
    }

    favoritos.push({ titulo, poster });

    localStorage.setItem("favoritos", JSON.stringify(favoritos));

    alert("Agregado ⭐");
}

/* ⭐ MOSTRAR FAVORITOS */
function mostrarFavoritos(){

    let contenedor = document.getElementById("contenedor");
    let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

    if(favoritos.length === 0){
        contenedor.innerHTML = "<p>No hay favoritos</p>";
        return;
    }

    contenedor.innerHTML = "";

    favoritos.forEach(movie => {

        contenedor.innerHTML += `
        <div class="card">

            <img src="${movie.poster}">

            <div class="info">
                <h3>${movie.titulo}</h3>
            </div>

        </div>`;
    });
}

/* 🎭 DETALLES */
async function verDetalles(id){

    let modal = document.getElementById("modal");
    let detalle = document.getElementById("detalle");

    let respuesta = await fetch(
        `https://www.omdbapi.com/?i=${id}&apikey=${apiKey}`
    );

    let datos = await respuesta.json();

    detalle.innerHTML = `
        <h2>${datos.Title}</h2>
        <img src="${datos.Poster}">
        <p>⭐ ${datos.imdbRating}</p>
        <p>${datos.Plot}</p>
    `;

    modal.style.display = "block";
}

/* ❌ CERRAR */
function cerrarModal(){
    document.getElementById("modal").style.display = "none";
}

/* ENTER */
document.addEventListener("keydown", e => {
    if(e.key === "Enter") buscarPeliculas();
});

</script>

</body>
</html>
